<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Woodmill Pre-Use Inspection — QR Codes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #eef2f5;
      padding: 24px;
    }

    /* Screen header */
    .page-header { text-align: center; margin-bottom: 28px; }
    h1 { font-size: 22px; font-weight: 800; color: #0e023a; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #706f6f; }
    .print-btn {
      display: inline-block; margin-top: 16px;
      padding: 10px 28px;
      background: #14a1e9; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .print-btn:hover { background: #0d8fd4; }

    /* Grid — 2 columns */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 780px;
      margin: 0 auto;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(14,2,58,0.12);
      display: flex;
      flex-direction: column;
    }

    /* Navy top bar with logo + group badge */
    .card-header {
      background: #0e023a;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .card-logo {
      height: 22px;
      width: auto;
      filter: brightness(0) invert(1);
    }
    .card-group-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #14a1e9;
      border: 1px solid rgba(20,161,233,.6);
      border-radius: 20px;
      padding: 3px 9px;
      white-space: nowrap;
    }

    /* Body */
    .card-body {
      padding: 18px 18px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    /* QR code framed */
    .card-qr {
      line-height: 0;
      border: 4px solid #0e023a;
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .card-qr img,
    .card-qr canvas { width: 160px !important; height: 160px !important; }

    /* Machine name */
    .card-name {
      font-size: 22px;
      font-weight: 800;
      color: #0e023a;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -.01em;
    }

    /* Instruction line */
    .card-sub {
      font-size: 11px;
      color: #706f6f;
      text-align: center;
      line-height: 1.5;
    }

    /* URL (hidden on screen, visible on print) */
    .card-url {
      font-size: 7.5px;
      color: #bbb;
      word-break: break-all;
      text-align: center;
      padding: 0 8px 10px;
      display: none;
    }

    /* Blue bottom accent */
    .card-footer-bar {
      height: 5px;
      background: linear-gradient(90deg, #0e023a 0%, #14a1e9 100%);
    }

    /* ── PRINT ── */
    @media print {
      @page { size: A4 portrait; margin: 12mm; }

      body { background: #fff; padding: 0; }
      .page-header { display: none; }

      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10mm;
        max-width: 100%;
        margin: 0;
      }

      .card {
        box-shadow: none;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .card-qr img,
      .card-qr canvas { width: 148px !important; height: 148px !important; }

      .card-name { font-size: 20px; }
      .card-url  { display: block; }

      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Woodmill Pre-Use Inspection</h1>
  <p class="page-sub">Print and laminate — affix each card to the corresponding machine or bench.</p>
  <button class="print-btn" onclick="window.print()">Print QR Codes</button>
</div>

<div class="grid" id="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const BASE_URL = 'https://JonasSimo.github.io/repose-tracker/inspect.html?m=';

const MACHINES = [
  { id: 'bandsaw',         name: 'Bandsaw',          group: 'Saws'     },
  { id: 'panel-saw-1',     name: 'Panel Saw 1',       group: 'Saws'     },
  { id: 'panel-saw-2',     name: 'Panel Saw 2',       group: 'Saws'     },
  { id: 'crosscut-saw-1',  name: 'Crosscut Saw 1',    group: 'Saws'     },
  { id: 'crosscut-saw-2',  name: 'Crosscut Saw 2',    group: 'Saws'     },
  { id: 'pillar-drill',    name: 'Pillar Drill',      group: 'Machines' },
  { id: 't-nut-1',         name: 'T-Nut Machine 1',   group: 'Machines' },
  { id: 't-nut-2',         name: 'T-Nut Machine 2',   group: 'Machines' },
  { id: 'cnc-1',           name: 'CNC Machine 1',     group: 'Machines' },
  { id: 'cnc-2',           name: 'CNC Machine 2',     group: 'Machines' },
  { id: 'sander',          name: 'Sander',            group: 'Machines' },
  { id: 'bench-a',         name: 'Blocking Bench A',  group: 'Benches'  },
  { id: 'bench-b',         name: 'Blocking Bench B',  group: 'Benches'  },
  { id: 'bench-c',         name: 'Blocking Bench C',  group: 'Benches'  },
  { id: 'bench-d',         name: 'Blocking Bench D',  group: 'Benches'  },
  { id: 'bench-e',         name: 'Blocking Bench E',  group: 'Benches'  },
];

const grid = document.getElementById('grid');

MACHINES.forEach(m => {
  const url = BASE_URL + m.id;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <img class="card-logo"
        src="./Repose_RGB_logo_Colour_with_strapline_1500pxW.png"
        alt="Repose Furniture"
        onerror="this.style.display='none'">
      <span class="card-group-badge">${m.group}</span>
    </div>
    <div class="card-body">
      <div class="card-qr" id="qr-${m.id}"></div>
      <div class="card-name">${m.name}</div>
      <div class="card-sub">Scan to complete<br>pre-use inspection</div>
    </div>
    <div class="card-url">${url}</div>
    <div class="card-footer-bar"></div>
  `;
  grid.appendChild(card);

  new QRCode(document.getElementById('qr-' + m.id), {
    text:           url,
    width:          160,
    height:         160,
    colorDark:      '#0e023a',
    colorLight:     '#ffffff',
    correctLevel:   QRCode.CorrectLevel.M,
  });
});
</script>
</body>
</html>
